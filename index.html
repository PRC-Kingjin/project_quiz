<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>行中轴 知历史</title>
  <style>
    :root {
      --bg-top: #fff7dc;
      --bg-bottom: #eef7ff;
      --card: rgba(255, 255, 255, 0.9);
      --card-strong: rgba(255, 255, 255, 0.97);
      --text: #3d2c42;
      --subtle: #6d6076;
      --accent: #ff8f6b;
      --accent-deep: #ef6f47;
      --sky: #77c8f4;
      --mint: #8fd9b6;
      --gold: #f5c94a;
      --rose: #ffb8b0;
      --ok: #52b788;
      --bad: #f07167;
      --shadow: 0 18px 42px rgba(115, 109, 133, 0.18);
      --radius-xl: 32px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --safe-top: max(18px, env(safe-area-inset-top));
      --safe-bottom: max(18px, env(safe-area-inset-bottom));
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 15% 12%, rgba(255, 255, 255, 0.9), transparent 22%),
        radial-gradient(circle at 88% 18%, rgba(255, 212, 121, 0.55), transparent 18%),
        radial-gradient(circle at 80% 82%, rgba(119, 200, 244, 0.35), transparent 18%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      color: var(--text);
      font-family: ui-rounded, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      z-index: 0;
      pointer-events: none;
      border-radius: 999px;
      filter: blur(2px);
    }

    body::before {
      width: 180px;
      height: 180px;
      left: -40px;
      top: 10vh;
      background: rgba(255, 210, 141, 0.28);
    }

    body::after {
      width: 220px;
      height: 220px;
      right: -80px;
      bottom: 8vh;
      background: rgba(126, 209, 233, 0.18);
    }

    button {
      border: none;
      background: none;
      font: inherit;
      color: inherit;
      cursor: pointer;
    }

    .app-shell {
      position: relative;
      z-index: 1;
      width: min(960px, 100%);
      margin: 0 auto;
      padding: calc(var(--safe-top) + 10px) 16px calc(var(--safe-bottom) + 24px);
    }

    .panel {
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.72);
      box-shadow: var(--shadow);
      border-radius: var(--radius-xl);
      backdrop-filter: blur(18px);
    }

    .home-hero {
      position: relative;
      overflow: hidden;
      padding: 28px 22px 22px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.92), rgba(255, 243, 214, 0.94)),
        var(--card);
    }

    .home-hero::after {
      content: "";
      position: absolute;
      right: 18px;
      top: 18px;
      width: 92px;
      height: 92px;
      border-radius: 28px 28px 28px 8px;
      background:
        radial-gradient(circle at 26% 32%, rgba(255,255,255,0.92) 0 14%, transparent 15%),
        radial-gradient(circle at 68% 32%, rgba(255,255,255,0.92) 0 14%, transparent 15%),
        radial-gradient(circle at 48% 68%, rgba(255,212,121,0.92) 0 18%, transparent 19%),
        linear-gradient(135deg, rgba(255,184,176,0.95), rgba(255,143,107,0.95));
      box-shadow: inset 0 -8px 16px rgba(255,255,255,0.28);
      opacity: 0.9;
      transform: rotate(8deg);
    }

    .title {
      margin: 0;
      font-size: clamp(34px, 8vw, 52px);
      line-height: 1.08;
      letter-spacing: 1px;
    }

    .subtitle {
      margin: 10px 0 0;
      font-size: clamp(18px, 4.8vw, 24px);
      color: var(--subtle);
      line-height: 1.5;
      max-width: 16em;
    }

    .hero-badges,
    .count-grid,
    .voice-grid,
    .mode-grid,
    .action-row,
    .stats-grid,
    .result-grid,
    .clue-list,
    .option-grid,
    .footer-actions {
      display: grid;
      gap: 12px;
    }

    .hero-badges {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-top: 20px;
    }

    .badge-card {
      padding: 16px 18px;
      border-radius: var(--radius-lg);
      background: var(--card-strong);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.78);
    }

    .badge-label {
      font-size: 16px;
      color: var(--subtle);
    }

    .badge-value {
      margin-top: 6px;
      font-size: clamp(24px, 6vw, 34px);
      font-weight: 700;
      color: var(--accent-deep);
    }

    .section {
      margin-top: 18px;
      padding: 20px;
    }

    .section-title {
      margin: 0 0 14px;
      font-size: 22px;
    }

    .count-grid,
    .voice-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .voice-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .choice-chip,
    .mode-card,
    .small-button,
    .option-button,
    .nav-button {
      min-height: 68px;
      border-radius: 999px;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease, opacity 0.18s ease;
    }

    .choice-chip {
      padding: 0 10px;
      font-size: 22px;
      font-weight: 700;
      background: rgba(255,255,255,0.78);
      box-shadow: inset 0 0 0 1px rgba(143, 217, 182, 0.35);
    }

    .choice-chip.active {
      background: linear-gradient(135deg, rgba(143,217,182,0.94), rgba(119,200,244,0.88));
      box-shadow: 0 12px 24px rgba(119,200,244,0.18);
    }

    .mode-grid {
      grid-template-columns: 1fr;
    }

    .mode-card {
      position: relative;
      padding: 20px 22px;
      border-radius: var(--radius-lg);
      text-align: left;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.92), rgba(255,248,232,0.95));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.86);
    }

    .mode-card[data-tone="random"] {
      background: linear-gradient(135deg, rgba(255,245,222,0.95), rgba(255,184,176,0.5));
    }

    .mode-card[data-tone="wrong"] {
      background: linear-gradient(135deg, rgba(240,250,245,0.96), rgba(143,217,182,0.5));
    }

    .mode-title {
      display: block;
      font-size: 28px;
      font-weight: 800;
    }

    .mode-desc {
      display: block;
      margin-top: 6px;
      font-size: 18px;
      line-height: 1.45;
      color: var(--subtle);
    }

    .action-row {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-top: 18px;
    }

    .small-button,
    .nav-button {
      padding: 0 18px;
      font-size: 20px;
      font-weight: 700;
      background: rgba(255,255,255,0.86);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.85);
    }

    .small-button.primary,
    .nav-button.primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-deep));
      color: white;
      box-shadow: 0 16px 28px rgba(239,111,71,0.22);
    }

    .small-button.warning {
      background: linear-gradient(135deg, rgba(255, 216, 135, 0.95), rgba(245, 201, 74, 0.92));
    }

    .small-button.ghost {
      background: rgba(255,255,255,0.7);
      color: var(--subtle);
    }

    .small-button:disabled,
    .nav-button:disabled,
    .option-button:disabled {
      opacity: 0.55;
      cursor: default;
      transform: none;
      box-shadow: none;
    }

    .notice {
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 18px;
      font-size: 18px;
      line-height: 1.5;
      background: rgba(255,255,255,0.8);
      color: var(--subtle);
    }

    .notice.warning {
      background: rgba(255, 245, 222, 0.92);
      color: #8d5a11;
    }

    .notice.bad {
      background: rgba(255, 235, 233, 0.94);
      color: #b74f46;
    }

    .quiz-card,
    .result-card {
      padding: 20px;
    }

    .quiz-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    .quiz-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 18px;
      font-weight: 700;
      background: rgba(255,255,255,0.82);
      color: var(--accent-deep);
    }

    .progress-track {
      width: 100%;
      height: 16px;
      margin-top: 16px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255,255,255,0.72);
      box-shadow: inset 0 1px 3px rgba(94, 87, 109, 0.12);
    }

    .progress-bar {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--sky), var(--mint));
      transition: width 0.22s ease;
    }

    .question-title {
      margin: 20px 0 10px;
      font-size: clamp(28px, 7vw, 38px);
      line-height: 1.45;
    }

    .clue-list {
      margin-top: 16px;
    }

    .clue-item {
      padding: 16px 18px;
      border-radius: 22px;
      background: linear-gradient(135deg, rgba(119,200,244,0.16), rgba(143,217,182,0.16));
      font-size: 20px;
      line-height: 1.6;
    }

    .option-grid {
      grid-template-columns: 1fr;
      margin-top: 18px;
    }

    .option-button {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      width: 100%;
      min-height: 84px;
      padding: 16px 18px;
      border-radius: 26px;
      text-align: left;
      font-size: clamp(24px, 5vw, 30px);
      line-height: 1.45;
      background: rgba(255,255,255,0.92);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.88);
    }

    .option-button .option-key {
      flex: none;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 800;
      background: rgba(255, 216, 135, 0.55);
    }

    .option-button.correct {
      background: rgba(214, 246, 228, 0.98);
      box-shadow: inset 0 0 0 2px rgba(82, 183, 136, 0.35);
    }

    .option-button.wrong {
      background: rgba(255, 229, 227, 0.98);
      box-shadow: inset 0 0 0 2px rgba(240, 113, 103, 0.28);
    }

    .option-button.selected {
      transform: translateY(-1px) scale(1.01);
    }

    .feedback-card {
      margin-top: 18px;
      padding: 18px;
      border-radius: 26px;
      font-size: 20px;
      line-height: 1.75;
      background: rgba(255,255,255,0.92);
    }

    .feedback-card.good {
      background: linear-gradient(135deg, rgba(214,246,228,0.98), rgba(255,255,255,0.96));
    }

    .feedback-card.bad {
      background: linear-gradient(135deg, rgba(255,229,227,0.98), rgba(255,255,255,0.96));
    }

    .feedback-title {
      margin: 0 0 8px;
      font-size: 24px;
      font-weight: 800;
    }

    .feedback-answer {
      font-weight: 700;
      color: var(--accent-deep);
    }

    .footer-actions {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-top: 18px;
    }

    .footer-actions.full {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .result-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-top: 18px;
    }

    .result-item {
      padding: 16px;
      border-radius: 24px;
      background: rgba(255,255,255,0.88);
      text-align: center;
    }

    .result-label {
      font-size: 17px;
      color: var(--subtle);
    }

    .result-value {
      margin-top: 8px;
      font-size: clamp(28px, 6vw, 40px);
      font-weight: 800;
      color: var(--accent-deep);
    }

    .result-cheer {
      margin-top: 16px;
      padding: 18px;
      border-radius: 24px;
      background: linear-gradient(135deg, rgba(255,245,222,0.98), rgba(255,255,255,0.92));
      font-size: 22px;
      line-height: 1.6;
    }

    .empty-state {
      margin-top: 16px;
      padding: 24px 18px;
      border-radius: 24px;
      background: rgba(255,255,255,0.84);
      text-align: center;
      font-size: 20px;
      line-height: 1.7;
      color: var(--subtle);
    }

    .tiny-note {
      margin-top: 10px;
      font-size: 16px;
      color: var(--subtle);
      line-height: 1.5;
    }

    @media (min-width: 720px) {
      .app-shell {
        padding-left: 24px;
        padding-right: 24px;
      }

      .mode-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .option-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 560px) {
      .home-hero {
        padding-right: 108px;
      }

      .hero-badges,
      .count-grid,
      .voice-grid,
      .action-row,
      .result-grid,
      .footer-actions,
      .footer-actions.full {
        grid-template-columns: 1fr;
      }

      .section,
      .quiz-card,
      .result-card {
        padding: 18px 16px;
      }

      .small-button,
      .nav-button,
      .choice-chip {
        min-height: 64px;
      }
    }

    @media (hover: hover) {
      .choice-chip:hover,
      .mode-card:hover,
      .small-button:hover,
      .option-button:hover,
      .nav-button:hover {
        transform: translateY(-2px);
      }
    }
  </style>
</head>
<body>
  <div id="app" class="app-shell"></div>
  <script>
    const STORAGE_KEYS = {
      wrongBook: 'zzx_wrong_book_v1',
      totalStars: 'zzx_total_stars_v1',
      voiceEnabled: 'zzx_voice_enabled_v1'
    };

    const RAW_QUESTION_BANK = [
  {
    "id": 1,
    "question": "社稷坛位于太庙的什么方向？",
    "options": [
      "A 东",
      "B 西",
      "C 东北",
      "D 西南"
    ],
    "answer": "D",
    "explanation": "社稷坛位于太庙的西侧，也就是西南方向，这是古代都城规划中“左祖右社”原则的体现。所谓“左祖右社”，是指皇帝面朝南站立时，左边设祖庙（太庙），右边设社稷坛。这一布局来自古代礼制，是国家制度的一部分，而不是随便安排的。\n\n太庙代表祖先，是王朝血统和延续的象征；社稷坛中的“社”是土地神，“稷”是五谷神，代表国家赖以生存的土地和粮食。也就是说，一个国家既要有祖先的传承，也要有土地和农业作为基础。\n\n北京在明清时期作为都城，严格按照这种礼制来建设，把太庙放在东边、社稷坛放在西边，体现了国家秩序在城市中的具体表达。\n\n记忆点：左祖右社——太庙在东，社稷在西。",
    "type": "single"
  },
  {
    "id": 2,
    "question": "北京中轴线最终完成定型是在什么朝代？",
    "options": [
      "A 元",
      "B 明",
      "C 清",
      "D 燕"
    ],
    "answer": "B",
    "explanation": "北京中轴线真正完成并形成完整体系，是在明朝。虽然元代的大都已经有中轴线的雏形，但当时的结构还不够完善，也没有形成严格的礼制秩序。\n\n到了明成祖永乐年间，北京被定为首都，并进行大规模重建。紫禁城被放在中轴线中心，所有重要建筑，比如宫殿、城门、祭祀场所，都沿着南北一条直线排列。这种布局不仅整齐，还体现了“皇帝居中、天下围绕”的思想。\n\n中轴线因此不只是道路，而是一种把政治权力表现出来的方式。通过空间布局，让人一眼就能看出谁在中心。\n\n记忆点：中轴线真正成型在明朝。",
    "type": "single"
  },
  {
    "id": 3,
    "question": "北京中轴线的起源可以追溯到哪个朝代？",
    "options": [
      "A 元",
      "B 明",
      "C 清",
      "D 燕"
    ],
    "answer": "A",
    "explanation": "北京中轴线最早可以追溯到元朝的大都城。元世祖忽必烈在建设大都时，就采用了南北对称的城市布局，并设置了一条贯穿全城的中轴线。\n\n这条中轴线当时还没有后来那么复杂，但已经起到了“城市骨架”的作用，决定了主要建筑和道路的排列方式。也就是说，北京的基本结构在元代就已经打下基础。\n\n到了明清时期，北京在元大都的基础上重建和扩展，中轴线被进一步强化，加入更多宫殿和礼制建筑，最终形成今天我们看到的完整形态。\n\n记忆点：中轴线起源于元，完善于明。",
    "type": "single"
  },
  {
    "id": 4,
    "question": "北京中轴线一共有多少处重要节点？",
    "options": [
      "A 3",
      "B 5",
      "C 10",
      "D 14"
    ],
    "answer": "D",
    "explanation": "北京中轴线从北到南串联起14个重要节点，比如钟鼓楼、景山、故宫、天安门、前门、永定门等。这些节点不是随便排列的，而是按照等级和功能严格设计的。\n\n越靠近中轴线中心的建筑，地位越高、作用越重要。例如紫禁城位于最核心，是皇帝居住和处理国家事务的地方；天安门是重要的礼仪空间；城门则负责城市出入和防御。\n\n这种从中心向外展开的结构，体现了古代都城的秩序：最重要的在中间，其他依次展开。中轴线因此不仅是空间结构，也是政治结构。\n\n记忆点：中轴线重要节点共14个。",
    "type": "single"
  },
  {
    "id": 5,
    "question": "系统研究北京中轴线的著名建筑学家是谁？",
    "options": [
      "A 胡适",
      "B 蔡元培",
      "C 梁思成",
      "D 林徽因"
    ],
    "answer": "C",
    "explanation": "梁思成是中国著名的建筑学家，他对北京中轴线进行了系统研究，并把这一概念清晰地总结出来。在他之前，中轴线虽然存在，但并没有被完整地当作一个整体来研究。\n\n梁思成通过实地测绘和研究，发现中轴线不仅是一条直线，而是一整套完整的城市规划体系。他指出，北京中轴线在世界城市中非常少见，是一条长度长、保存完整、结构清晰的轴线。\n\n他的研究让人们意识到，北京不仅是历史城市，更是一座经过精密设计的都城。这也为后来的保护和申遗工作提供了重要依据。\n\n记忆点：研究中轴线，要记梁思成。",
    "type": "single"
  },
  {
    "id": 6,
    "question": "元大都城市规划的重要形成阶段是在什么时候？",
    "options": [
      "A 元2年",
      "B 元3年",
      "C 元4年",
      "D 元7年"
    ],
    "answer": "B",
    "explanation": "元大都的建设是在元世祖忽必烈时期完成的，其中城市规划的关键阶段大约在元三年前后。这一时期，北京开始从原有的地方城市转变为全国政治中心。\n\n元大都的规划非常先进，采用了南北中轴线和规则的棋盘式道路布局。城市被划分为整齐的方格，宫城位于中心位置，体现了高度理性的设计思想。\n\n这种规划方式对后来的明清北京影响非常大。明代重建北京时，并不是完全重新设计，而是在元大都的基础上进行调整和强化。\n\n也就是说，北京今天的城市骨架，其实早在元代就已经形成了。\n\n记忆点：元大都关键规划在元三年前后。",
    "type": "single"
  },
  {
    "id": 7,
    "question": "被称为北京中轴线“生态见证者”的动物是？",
    "options": [
      "A 北京雨燕",
      "B 北京兔爷",
      "C 老虎",
      "D 熊猫"

    function normalizeOption(optionText) {
      const text = typeof optionText === 'string' ? optionText.trim() : '';
      const match = text.match(/^([A-D])[\s、.．:：\-]*(.+)$/);
      if (!match) return null;
      return { key: match[1], text: match[2].trim() };
    }

    function normalizeQuestion(question) {
      const options = (Array.isArray(question.options) ? question.options : [])
        .map(normalizeOption)
        .filter(Boolean);
      const answer = typeof question.answer === 'string' ? question.answer.trim().toUpperCase() : '';
      const answerOption = options.find((option) => option.key === answer);
      return {
        id: Number(question.id),
        displayNo: String(question.id),
        question: typeof question.question === 'string' ? question.question.trim() : '',
        options,
        answer,
        answerText: answerOption ? answerOption.text : answer,
        explanation: typeof question.explanation === 'string' ? question.explanation.trim() : '',
        type: question.type === 'clue' ? 'clue' : 'single',
        clues: Array.isArray(question.clues) ? question.clues.map((clue) => String(clue).trim()).filter(Boolean) : []
      };
    }

    const QUESTION_BANK = RAW_QUESTION_BANK.map(normalizeQuestion);

    const state = {
      questions: QUESTION_BANK,
      view: 'home',
      countChoice: '10',
      voiceEnabled: loadStoredBoolean(STORAGE_KEYS.voiceEnabled, true),
      totalStars: loadStoredNumber(STORAGE_KEYS.totalStars, 0),
      wrongBook: loadWrongBook(),
      notice: '',
      noticeTone: 'info',
      session: null,
      speech: {
        available: typeof window !== 'undefined' && 'speechSynthesis' in window && 'SpeechSynthesisUtterance' in window,
        unlocked: false,
        voice: null,
        warned: false
      }
    };

    const app = document.getElementById('app');

    function loadStoredBoolean(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        if (raw === null) return fallback;
        return raw === 'true';
      } catch (error) {
        return fallback;
      }
    }

    function loadStoredNumber(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        const value = Number(raw);
        return Number.isFinite(value) ? value : fallback;
      } catch (error) {
        return fallback;
      }
    }

    function loadWrongBook() {
      try {
        const raw = localStorage.getItem(STORAGE_KEYS.wrongBook);
        if (!raw) return {};
        const parsed = JSON.parse(raw);
        return parsed && typeof parsed === 'object' ? parsed : {};
      } catch (error) {
        return {};
      }
    }

    function saveWrongBook() {
      try {
        localStorage.setItem(STORAGE_KEYS.wrongBook, JSON.stringify(state.wrongBook));
      } catch (error) {}
    }

    function saveVoiceEnabled() {
      try {
        localStorage.setItem(STORAGE_KEYS.voiceEnabled, String(state.voiceEnabled));
      } catch (error) {}
    }

    function saveTotalStars() {
      try {
        localStorage.setItem(STORAGE_KEYS.totalStars, String(state.totalStars));
      } catch (error) {}
    }

    function setNotice(message, tone) {
      state.notice = message || '';
      state.noticeTone = tone || 'info';
      render();
      if (message) {
        const currentMessage = message;
        window.clearTimeout(setNotice._timer);
        setNotice._timer = window.setTimeout(() => {
          if (state.notice === currentMessage) {
            state.notice = '';
            render();
          }
        }, 3000);
      }
    }

    function shuffle(array) {
      const copy = array.slice();
      for (let index = copy.length - 1; index > 0; index -= 1) {
        const randomIndex = Math.floor(Math.random() * (index + 1));
        const temp = copy[index];
        copy[index] = copy[randomIndex];
        copy[randomIndex] = temp;
      }
      return copy;
    }

    function getWrongQuestions() {
      const wrongIds = new Set(Object.keys(state.wrongBook));
      return state.questions.filter((question) => wrongIds.has(String(question.id)));
    }

    function getSelectedCount(listLength) {
      if (state.countChoice === 'all') return listLength;
      return Math.min(listLength, Number(state.countChoice));
    }

    function unlockSpeech() {
      if (!state.speech.available || state.speech.unlocked) return;
      try {
        const utterance = new SpeechSynthesisUtterance(' ');
        utterance.volume = 0;
        speechSynthesis.speak(utterance);
        speechSynthesis.cancel();
      } catch (error) {}
      state.speech.unlocked = true;
    }

    function pickVoice() {
      if (!state.speech.available) return null;
      const voices = speechSynthesis.getVoices();
      if (!voices || !voices.length) return null;
      const zhVoices = voices.filter((voice) => /zh|cmn/i.test(voice.lang) || /中文|普通话|国语|Chinese|Mandarin/i.test(voice.name + ' ' + voice.voiceURI));
      const femaleHint = /female|woman|girl|女|xiaoxiao|xiaoyi|xiaohan|xiaomeng|xiaoqiu|tingting|hanhan|huihui|meijia|sin-ji/i;
      const femaleVoice = zhVoices.find((voice) => femaleHint.test(voice.name + ' ' + voice.voiceURI));
      state.speech.voice = femaleVoice || zhVoices[0] || voices[0] || null;
      return state.speech.voice;
    }

    function stopSpeech() {
      if (!state.speech.available) return;
      try {
        speechSynthesis.cancel();
      } catch (error) {}
    }

    function getExplanationText(question) {
      const explanation = question && typeof question.explanation === 'string' ? question.explanation.trim() : '';
      return explanation || '本题讲解待补充';
    }

    function getRevealedClueCount(question) {
      if (!question || question.type !== 'clue' || !Array.isArray(question.clues) || !question.clues.length || !state.session) {
        return 0;
      }
      const stored = state.session.clueProgress ? state.session.clueProgress[question.id] : undefined;
      const count = Number.isFinite(stored) ? stored : 1;
      return Math.min(question.clues.length, Math.max(1, count));
    }

    function getVisibleClues(question, revealAll) {
      if (!question || !Array.isArray(question.clues) || !question.clues.length) return [];
      if (revealAll || question.type !== 'clue' || !state.session) return question.clues;
      return question.clues.slice(0, getRevealedClueCount(question));
    }

    function canRevealNextClue(question) {
      if (!question || question.type !== 'clue' || !Array.isArray(question.clues) || !question.clues.length || !state.session) {
        return false;
      }
      if (state.session.answers[question.id]) return false;
      return getRevealedClueCount(question) < question.clues.length;
    }

    function speakText(text) {
      if (!state.voiceEnabled) return;
      if (!state.speech.available) {
        if (!state.speech.warned) {
          state.speech.warned = true;
          setNotice('当前设备语音不可用，但不影响答题。', 'warning');
        }
        return;
      }
      if (!state.speech.unlocked) return;
      stopSpeech();
      const voice = pickVoice();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = voice && voice.lang ? voice.lang : 'zh-CN';
      utterance.voice = voice || null;
      utterance.rate = 0.93;
      utterance.pitch = 1.04;
      utterance.volume = 1;
      speechSynthesis.speak(utterance);
    }

    function getQuestionSpeechText(question, withExplanation) {
      const revealAllClues = withExplanation || Boolean(state.session && state.session.answers && state.session.answers[question.id]);
      const visibleClues = getVisibleClues(question, revealAllClues);
      const parts = [
        '第' + question.displayNo + '题。',
        question.question
      ];
      if (visibleClues.length) {
        parts.push('线索。');
        visibleClues.forEach((clue, index) => {
          parts.push('第' + (index + 1) + '条，' + clue);
        });
      }
      if (Array.isArray(question.options) && question.options.length) {
        parts.push('选项。');
        question.options.forEach((option) => {
          parts.push(option.key + '，' + option.text);
        });
      }
      if (withExplanation) {
        parts.push('正确答案是' + question.answerText + '。');
        parts.push(getExplanationText(question));
      }
      return parts.join('');
    }

    function startSession(mode) {
      unlockSpeech();
      const sourceList = mode === 'wrong' ? getWrongQuestions() : state.questions.slice();
      if (!sourceList.length) {
        setNotice('错题本还是空的，我们先去顺序练习吧。', 'warning');
        return;
      }

      let workingList = sourceList.slice();
      if (mode === 'random') {
        workingList = shuffle(workingList);
      }

      const pickCount = getSelectedCount(workingList.length);
      const sessionQuestions = workingList.slice(0, pickCount);

      if (!sessionQuestions.length) {
        setNotice('这次没有可练习的题目，请换一个数量再试试。', 'warning');
        return;
      }

      if (mode === 'wrong' && sessionQuestions.length < Number(state.countChoice || sessionQuestions.length) && state.countChoice !== 'all') {
        setNotice('错题本里的题目还没有这么多，先把现有错题练一遍吧。', 'warning');
      }

      const clueProgress = {};
      sessionQuestions.forEach((question) => {
        if (question.type === 'clue' && Array.isArray(question.clues) && question.clues.length) {
          clueProgress[question.id] = 1;
        }
      });

      state.session = {
        mode,
        countChoice: state.countChoice,
        questions: sessionQuestions,
        currentIndex: 0,
        answers: {},
        clueProgress,
        starsEarned: 0
      };
      state.view = 'quiz';
      render();
      queueQuestionSpeech(false);
    }

    function queueQuestionSpeech(withExplanation) {
      const question = getCurrentQuestion();
      if (!question) return;
      window.setTimeout(() => {
        speakText(getQuestionSpeechText(question, withExplanation));
      }, 80);
    }

    function getCurrentQuestion() {
      if (!state.session) return null;
      return state.session.questions[state.session.currentIndex] || null;
    }

    function getCurrentAnswerRecord() {
      const question = getCurrentQuestion();
      if (!question || !state.session) return null;
      return state.session.answers[question.id] || null;
    }

    function answerQuestion(optionKey) {
      unlockSpeech();
      const question = getCurrentQuestion();
      if (!question || !state.session) return;
      if (state.session.answers[question.id]) return;

      const option = question.options.find((item) => item.key === optionKey);
      if (!option) return;

      const isCorrect = optionKey === question.answer;
      state.session.answers[question.id] = {
        selectedKey: optionKey,
        selectedText: option.text,
        correct: isCorrect
      };

      if (isCorrect) {
        state.session.starsEarned += 1;
        state.totalStars += 1;
        saveTotalStars();
      } else {
        state.wrongBook[question.id] = {
          id: question.id,
          displayNo: question.displayNo,
          question: question.question,
          answerText: question.answerText,
          savedAt: Date.now()
        };
        saveWrongBook();
      }

      render();
    }

    function revealNextClue() {
      unlockSpeech();
      const question = getCurrentQuestion();
      if (!question || !state.session || !canRevealNextClue(question)) return;

      const nextCount = getRevealedClueCount(question) + 1;
      state.session.clueProgress[question.id] = nextCount;
      render();
      window.setTimeout(() => {
        speakText('第' + nextCount + '条线索。' + question.clues[nextCount - 1]);
      }, 80);
    }

    function goQuestion(step) {
      if (!state.session) return;
      stopSpeech();
      const nextIndex = state.session.currentIndex + step;
      if (nextIndex < 0 || nextIndex >= state.session.questions.length) return;
      state.session.currentIndex = nextIndex;
      render();
      queueQuestionSpeech(false);
    }

    function showResult() {
      stopSpeech();
      state.view = 'result';
      render();
    }

    function replaySpeech() {
      unlockSpeech();
      const question = getCurrentQuestion();
      if (!question) return;
      const answered = Boolean(getCurrentAnswerRecord());
      speakText(getQuestionSpeechText(question, answered));
    }

    function countStats() {
      if (!state.session) {
        return { correct: 0, wrong: 0, answered: 0, total: 0, score: 0 };
      }
      const records = Object.values(state.session.answers);
      const correct = records.filter((record) => record.correct).length;
      const wrong = records.filter((record) => !record.correct).length;
      const total = state.session.questions.length;
      return {
        correct,
        wrong,
        answered: records.length,
        total,
        score: total ? Math.round((correct / total) * 100) : 0
      };
    }

          <div class="footer-actions full">
            <button class="nav-button" data-action="prev" ${state.session.currentIndex === 0 ? 'disabled' : ''}>上一题</button>
            <button class="nav-button ${record ? 'primary' : ''}" data-action="next" ${record ? '' : 'disabled'}>${lastQuestion ? '看成绩' : '下一题'}</button>
            <button class="nav-button" data-action="replay" ${state.voiceEnabled && state.speech.available ? '' : 'disabled'}>再听一遍</button>
            <button class="nav-button" data-action="stop-speech" ${state.speech.available ? '' : 'disabled'}>停止朗读</button>
          </div>
          <div class="tiny-note">${state.speech.available ? '如果开着语音，进入新题后会自动读题。' : '当前设备语音不可用，但不影响答题。'}</div>
          ${renderNotice()}
        </section>
      `;
    }

    function renderResult() {
      const stats = countStats();
      return `
        <section class="panel result-card">
          <div class="quiz-top">
            <div class="quiz-tag">总分 ${stats.score} 分</div>
            <div class="quiz-tag">本轮星星 ${state.session ? state.session.starsEarned : 0}</div>
          </div>
          <div class="result-grid">
            <div class="result-item">
              <div class="result-label">答对题数</div>
              <div class="result-value">${stats.correct}</div>
            </div>
            <div class="result-item">
              <div class="result-label">答错题数</div>
              <div class="result-value">${stats.wrong}</div>
            </div>
            <div class="result-item">
              <div class="result-label">累计星星</div>
              <div class="result-value">${state.totalStars}</div>
            </div>
            <div class="result-item">
              <div class="result-label">错题本</div>
              <div class="result-value">${Object.keys(state.wrongBook).length}</div>
            </div>
          </div>
          <div class="result-cheer">${getCheerText(stats.score)}</div>
          <div class="footer-actions">
            <button class="nav-button primary" data-action="again">再来一次</button>
            <button class="nav-button" data-action="wrong-again">只练错题</button>
            <button class="nav-button" data-action="go-home">回到首页</button>
          </div>
          ${renderNotice()}
        </section>
      `;
    }

    function render() {
      if (state.view === 'home') {
        app.innerHTML = renderHome();
      } else if (state.view === 'quiz') {
        app.innerHTML = renderQuiz();
      } else {
        app.innerHTML = renderResult();
      }
    }

    app.addEventListener('click', (event) => {
      const button = event.target.closest('button[data-action]');
      if (!button) return;
      const action = button.dataset.action;
      if (button.disabled) return;

      switch (action) {
        case 'set-count':
          state.countChoice = button.dataset.value;
          render();
          break;
        case 'set-voice':
          state.voiceEnabled = button.dataset.value === 'on';
          saveVoiceEnabled();
          if (!state.voiceEnabled) stopSpeech();
          render();
          break;
        case 'start':
          startSession(button.dataset.mode);
          break;
        case 'clear-wrong':
          clearWrongBook();
          break;
        case 'reveal-clue':
          revealNextClue();
          break;
        case 'answer':
          answerQuestion(button.dataset.key);
          break;
        case 'prev':
          goQuestion(-1);
          break;
        case 'next':
          if (!state.session) break;
          if (state.session.currentIndex === state.session.questions.length - 1) {
            showResult();
          } else {
            goQuestion(1);
          }
          break;
        case 'replay':
          replaySpeech();
          break;
        case 'stop-speech':
          stopSpeech();
          break;
        case 'again':
          if (!state.session) break;
          startSession(state.session.mode);
          break;
        case 'wrong-again':
          startSession('wrong');
          break;
        case 'go-home':
          stopSpeech();
          state.view = 'home';
          render();
          break;
        default:
          break;
      }
    });

    document.addEventListener('pointerdown', unlockSpeech, { passive: true });
    document.addEventListener('keydown', unlockSpeech, { passive: true });

    if (state.speech.available) {
      pickVoice();
      window.speechSynthesis.addEventListener('voiceschanged', pickVoice);
    }

    window.addEventListener('beforeunload', stopSpeech);

    render();
  </script>
</body>
</html>
